<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaSchool Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark-space: #0a0c1a;
            --surface-glass: rgba(26, 28, 45, 0.7);
            --primary-accent: #818cf8;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-glow: rgba(129, 140, 248, 0.3);
            --success-color: #34d399;
            --error-color: #f87171;
            color-scheme: dark;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0a0c10);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, var(--primary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .tool-card:hover {
            background: rgba(129, 140, 248, 0.1);
            border-color: var(--primary-accent);
            transform: translateY(-5px);
        }

        .tool-card i {
            font-size: 2rem;
            color: var(--primary-accent);
            margin-bottom: 1rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(52, 211, 153, 0.1);
            color: var(--success-color);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--success-color);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(52, 211, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Infrastructure MediaSchool</h1>
        <p class="subtitle">Bienvenue sur votre portail d'administration sécurisé.</p>

        <div class="card-grid">
            <a id="link-pma" href="#" class="tool-card">
                <i class="fas fa-database"></i>
                <span>Base de données</span>
                <small style="color: var(--text-secondary); margin-top: 0.5rem;">PhpMyAdmin</small>
            </a>

            <a id="link-api" href="#" class="tool-card">
                <i class="fas fa-server"></i>
                <span>API Backend</span>
                <small style="color: var(--text-secondary); margin-top: 0.5rem;">Statut Système</small>
            </a>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="status-badge">
                <div class="pulse"></div>
                Serveur Opérationnel
            </div>
            <span style="font-size: 0.8rem; color: var(--text-secondary);" id="display-user">Utilisateur : ...</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Détecter l'utilisateur depuis l'URL (ex: env-tiago.iris.a3n.fr)
            const hostname = window.location.hostname;
            let username = "default";

            if (hostname.includes('env-')) {
                // Extrait 'tiago' de 'env-tiago.iris.a3n.fr'
                username = hostname.split('.')[0].replace('env-', '');
            }

            // 2. Mettre à jour les liens avec le port 4433
            const pmaLink = document.getElementById('link-pma');
            const apiLink = document.getElementById('link-api');
            const userDisplay = document.getElementById('display-user');

            if (pmaLink) {
                pmaLink.href = `https://pma-env-${username}.iris.a3n.fr:4433`;
            }

            if (apiLink) {
                // Si ton API est aussi sur le port 4433 ou un autre
                apiLink.href = `https://env-${username}.iris.a3n.fr:4433/api`;
            }

            if (userDisplay) {
                userDisplay.textContent = `Environnement : ${username.toUpperCase()}`;
            }

            console.log(`Configuration appliquée pour l'utilisateur : ${username}`);
        });
    </script>
</body>
</html>
